<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a; --surface: #141414; --border: #2a2a2a;
      --text: #fff; --muted: rgba(255,255,255,0.5); --accent: #fff;
      --danger: #ff4757; --success: #2ed573;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
    .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
    .header { margin-bottom: 3rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .header h1 { font-size: 1.75rem; font-weight: 500; margin-bottom: 0.5rem; }
    .header .actions { display: flex; gap: 1rem; margin-top: 1rem; }
    .header a { color: var(--muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    .header a:hover { color: var(--text); }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border); }
    .tab { padding: 0.75rem 1.5rem; background: none; border: none; color: var(--muted); cursor: pointer; font-family: inherit; font-size: 0.9rem; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }
    .section { display: none; }
    .section.active { display: block; animation: fadeIn 0.3s; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--muted); }
    .form-group input, .form-group textarea { width: 100%; padding: 0.875rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.95rem; font-family: inherit; }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
    .btn { padding: 0.875rem 2rem; border-radius: 8px; font-size: 0.9rem; font-weight: 500; font-family: inherit; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-primary:hover { opacity: 0.9; }
    .btn-danger { background: var(--danger); color: #fff; }
    .menu-items, .page-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
    .menu-item, .page-item { display: flex; gap: 1rem; align-items: center; padding: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
    .menu-item input { flex: 1; padding: 0.625rem 0.875rem; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.9rem; }
    .page-item-info { flex: 1; }
    .page-item-title { font-weight: 500; margin-bottom: 0.25rem; }
    .page-item-slug { color: var(--muted); font-size: 0.85rem; }
    .btn-sm { padding: 0.5rem 1rem; font-size: 0.8rem; }
    .btn-add { width: 100%; padding: 0.75rem; background: none; border: 1px dashed var(--border); color: var(--muted); border-radius: 8px; cursor: pointer; margin-bottom: 1.5rem; }
    .btn-add:hover { border-color: var(--text); color: var(--text); }
    .toast { position: fixed; top: 20px; right: 20px; padding: 1rem 1.5rem; background: var(--success); border-radius: 8px; display: none; z-index: 1000; }
    .toast.error { background: var(--danger); }
    .toast.show { display: block; animation: slideIn 0.3s; }
    .logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); }
    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .hidden { display: none; }
    .login-box { max-width: 400px; margin: 100px auto; padding: 2rem; background: var(--surface); border-radius: 8px; }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen">
    <div class="login-box">
      <h1 style="margin-bottom: 2rem;">Admin Login</h1>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="admin">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Password">
      </div>
      <button class="btn btn-primary" style="width: 100%;" onclick="login()">Login</button>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="admin-panel" class="hidden">
    <div class="container">
      <div class="header">
        <h1>Site Admin</h1>
        <div class="actions">
          <a href="/" target="_blank">→ View Site</a>
          <button class="btn btn-sm logout-btn" onclick="logout()">Logout</button>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="showTab('content')">Content</button>
        <button class="tab" onclick="showTab('menu')">Menu</button>
        <button class="tab" onclick="showTab('pages')">Pages</button>
      </div>

      <!-- Content Section -->
      <div id="section-content" class="section active">
        <div class="form-group">
          <label>Site Name</label>
          <input type="text" id="brand-name">
        </div>
        <div class="form-group">
          <label>Hero Title</label>
          <input type="text" id="hero-title">
        </div>
        <div class="form-group">
          <label>Hero Description</label>
          <textarea id="hero-description" rows="4"></textarea>
        </div>
        <button class="btn btn-primary" onclick="saveContent()">Save Content</button>
      </div>

      <!-- Menu Section -->
      <div id="section-menu" class="section">
        <div id="menu-items" class="menu-items"></div>
        <button class="btn-add" onclick="addMenuItem()">+ Add Menu Item</button>
        <button class="btn btn-primary" onclick="saveMenu()">Save Menu</button>
      </div>

      <!-- Pages Section -->
      <div id="section-pages" class="section">
        <div id="pages-list" class="page-list"></div>
        <hr style="margin: 2rem 0; border-color: var(--border);">
        <h3 style="margin-bottom: 1.5rem;">Add/Edit Page</h3>
        <div class="form-group">
          <label>Page Slug</label>
          <input type="text" id="page-slug" placeholder="about">
        </div>
        <div class="form-group">
          <label>Page Title</label>
          <input type="text" id="page-title" placeholder="About Us">
        </div>
        <div class="form-group">
          <label>Page Content (HTML)</label>
          <textarea id="page-content" rows="15"></textarea>
        </div>
        <button class="btn btn-primary" onclick="savePage()">Save Page</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const TOKEN_KEY = 'admin_token';
    let token = localStorage.getItem(TOKEN_KEY);
    let content = {};

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.className = 'toast', 3000);
    }

    async function apiFetch(url, options = {}) {
      if (token) {
        options.headers = { ...options.headers, 'x-auth-token': token, 'Content-Type': 'application/json' };
      }
      const res = await fetch(url, options);
      if (res.status === 401) {
        logout();
        throw new Error('Unauthorized');
      }
      return res.json();
    }

    async function login() {
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      
      try {
        const result = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        }).then(r => r.json());

        if (result.success) {
          token = result.token;
          localStorage.setItem(TOKEN_KEY, token);
          document.getElementById('login-screen').className = 'hidden';
          document.getElementById('admin-panel').className = '';
          loadContent();
        } else {
          showToast('Invalid credentials', 'error');
        }
      } catch (err) {
        showToast('Login failed', 'error');
      }
    }

    function logout() {
      localStorage.removeItem(TOKEN_KEY);
      token = null;
      document.getElementById('login-screen').className = '';
      document.getElementById('admin-panel').className = 'hidden';
    }

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('section-' + tab).classList.add('active');
    }

    async function loadContent() {
      try {
        content = await apiFetch('/api/content');
        document.getElementById('brand-name').value = content.brand?.name || '';
        document.getElementById('hero-title').value = content.hero?.title || '';
        document.getElementById('hero-description').value = content.hero?.description || '';
        renderMenu();
        renderPages();
      } catch (err) {
        showToast('Error loading content', 'error');
      }
    }

    async function saveContent() {
      try {
        await apiFetch('/api/content', {
          method: 'PUT',
          body: JSON.stringify({
            brand: { name: document.getElementById('brand-name').value },
            hero: {
              title: document.getElementById('hero-title').value,
              description: document.getElementById('hero-description').value
            }
          })
        });
        showToast('Content saved!');
        loadContent();
      } catch (err) {
        showToast('Error saving content', 'error');
      }
    }

    function renderMenu() {
      const container = document.getElementById('menu-items');
      if (!content.menu || content.menu.length === 0) {
        container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:1rem;">No menu items</p>';
        return;
      }
      container.innerHTML = content.menu.map((item, i) => `
        <div class="menu-item">
          <input type="text" value="${item.text}" placeholder="Link text" data-index="${i}" data-field="text">
          <input type="text" value="${item.url}" placeholder="URL" data-index="${i}" data-field="url">
          <button class="btn btn-sm btn-danger" onclick="removeMenuItem(${i})">Remove</button>
        </div>
      `).join('');
    }

    function addMenuItem() {
      if (!content.menu) content.menu = [];
      content.menu.push({ id: Date.now(), text: 'New Link', url: '/page/new' });
      renderMenu();
    }

    function removeMenuItem(index) {
      content.menu.splice(index, 1);
      renderMenu();
    }

    async function saveMenu() {
      const menuItems = [];
      document.querySelectorAll('.menu-item').forEach((item, i) => {
        menuItems.push({
          id: content.menu[i]?.id || Date.now() + i,
          text: item.querySelector('[data-field="text"]').value,
          url: item.querySelector('[data-field="url"]').value
        });
      });
      
      try {
        await apiFetch('/api/content', {
          method: 'PUT',
          body: JSON.stringify({ menu: menuItems })
        });
        content.menu = menuItems;
        showToast('Menu saved!');
      } catch (err) {
        showToast('Error saving menu', 'error');
      }
    }

    function renderPages() {
      const list = document.getElementById('pages-list');
      if (!content.pages || content.pages.length === 0) {
        list.innerHTML = '<p style="color:var(--muted);text-align:center;padding:1rem;">No pages yet</p>';
        return;
      }
      list.innerHTML = content.pages.map(page => `
        <div class="page-item">
          <div class="page-item-info">
            <div class="page-item-title">${page.title}</div>
            <div class="page-item-slug">/page/${page.slug}</div>
          </div>
          <button class="btn btn-sm" onclick="editPage('${page.slug}')">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deletePage('${page.slug}')">Delete</button>
        </div>
      `).join('');
    }

    function editPage(slug) {
      const page = content.pages.find(p => p.slug === slug);
      if (page) {
        document.getElementById('page-slug').value = page.slug;
        document.getElementById('page-title').value = page.title;
        document.getElementById('page-content').value = page.content || '';
      }
    }

    async function savePage() {
      const slug = document.getElementById('page-slug').value.trim();
      const title = document.getElementById('page-title').value.trim();
      const pageContent = document.getElementById('page-content').value;

      if (!slug || !title) {
        return showToast('Slug and title required', 'error');
      }

      try {
        await apiFetch('/api/pages', {
          method: 'POST',
          body: JSON.stringify({ slug, title, content: pageContent })
        });
        showToast('Page saved!');
        document.getElementById('page-slug').value = '';
        document.getElementById('page-title').value = '';
        document.getElementById('page-content').value = '';
        loadContent();
      } catch (err) {
        showToast('Error saving page', 'error');
      }
    }

    async function deletePage(slug) {
      if (!confirm(`Delete page "${slug}"?`)) return;
      
      try {
        await apiFetch(`/api/pages/${slug}`, { method: 'DELETE' });
        showToast('Page deleted!');
        loadContent();
      } catch (err) {
        showToast('Error deleting page', 'error');
      }
    }

    // Check if already logged in
    if (token) {
      document.getElementById('login-screen').className = 'hidden';
      document.getElementById('admin-panel').className = '';
      loadContent();
    }
  </script>
</body>
</html>
