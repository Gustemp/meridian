<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .login-box { max-width: 400px; margin: 100px auto; padding: 2rem; background: #1a1a1a; border-radius: 8px; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; color: #aaa; }
    input, textarea { width: 100%; padding: 0.75rem; background: #0a0a0a; border: 1px solid #333; border-radius: 4px; color: #fff; font-size: 1rem; }
    button { padding: 0.75rem 1.5rem; background: #4a9eff; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #3a8eef; }
    .section { background: #1a1a1a; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; }
    h1 { margin-bottom: 2rem; }
    h2 { margin-bottom: 1rem; font-size: 1.2rem; }
    .hidden { display: none; }
    .toast { position: fixed; top: 20px; right: 20px; padding: 1rem 1.5rem; background: #22c55e; border-radius: 4px; z-index: 1000; }
    .toast.error { background: #ef4444; }
    .page-item { background: #0a0a0a; padding: 1rem; border-radius: 4px; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
    .btn-danger { background: #ef4444; }
    .btn-danger:hover { background: #dc2626; }
    .logout-btn { float: right; background: #666; }
    .logout-btn:hover { background: #555; }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen">
    <div class="login-box">
      <h1>Admin Login</h1>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="admin">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Password">
      </div>
      <button onclick="login()">Login</button>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="admin-panel" class="hidden">
    <div class="container">
      <h1>Site Admin <button class="logout-btn" onclick="logout()">Logout</button></h1>
      
      <!-- Site Settings -->
      <div class="section">
        <h2>Site Settings</h2>
        <div class="form-group">
          <label>Site Name</label>
          <input type="text" id="siteName">
        </div>
        <div class="form-group">
          <label>Tagline</label>
          <input type="text" id="tagline">
        </div>
        <div class="form-group">
          <label>Hero Title</label>
          <input type="text" id="heroTitle">
        </div>
        <div class="form-group">
          <label>Hero Subtitle</label>
          <textarea id="heroSubtitle" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>CTA Text</label>
          <input type="text" id="ctaText">
        </div>
        <div class="form-group">
          <label>CTA Link</label>
          <input type="text" id="ctaLink">
        </div>
        <button onclick="saveSettings()">Save Settings</button>
      </div>

      <!-- Pages -->
      <div class="section">
        <h2>Pages</h2>
        <div id="pages-list"></div>
        <hr style="margin: 1.5rem 0; border-color: #333;">
        <h3 style="margin-bottom: 1rem;">Add/Edit Page</h3>
        <div class="form-group">
          <label>Page Slug</label>
          <input type="text" id="pageSlug" placeholder="about">
        </div>
        <div class="form-group">
          <label>Page Title</label>
          <input type="text" id="pageTitle" placeholder="About Us">
        </div>
        <div class="form-group">
          <label>Page Content (HTML)</label>
          <textarea id="pageContent" rows="10"></textarea>
        </div>
        <button onclick="savePage()">Save Page</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script>
    const TOKEN_KEY = 'admin_token';
    let token = localStorage.getItem(TOKEN_KEY);
    let content = {};

    async function apiFetch(url, options = {}) {
      if (token) {
        options.headers = { ...options.headers, 'x-auth-token': token, 'Content-Type': 'application/json' };
      }
      const res = await fetch(url, options);
      if (res.status === 401) {
        logout();
        throw new Error('Unauthorized');
      }
      return res.json();
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type}`;
      setTimeout(() => toast.className = 'toast hidden', 3000);
    }

    async function login() {
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      
      try {
        const result = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        }).then(r => r.json());

        if (result.success) {
          token = result.token;
          localStorage.setItem(TOKEN_KEY, token);
          document.getElementById('login-screen').className = 'hidden';
          document.getElementById('admin-panel').className = '';
          loadContent();
        } else {
          showToast('Invalid credentials', 'error');
        }
      } catch (err) {
        showToast('Login failed', 'error');
      }
    }

    function logout() {
      localStorage.removeItem(TOKEN_KEY);
      token = null;
      document.getElementById('login-screen').className = '';
      document.getElementById('admin-panel').className = 'hidden';
    }

    async function loadContent() {
      try {
        content = await apiFetch('/api/content');
        document.getElementById('siteName').value = content.siteName || '';
        document.getElementById('tagline').value = content.tagline || '';
        document.getElementById('heroTitle').value = content.heroTitle || '';
        document.getElementById('heroSubtitle').value = content.heroSubtitle || '';
        document.getElementById('ctaText').value = content.ctaText || '';
        document.getElementById('ctaLink').value = content.ctaLink || '';
        renderPages();
      } catch (err) {
        showToast('Error loading content', 'error');
      }
    }

    function renderPages() {
      const list = document.getElementById('pages-list');
      if (!content.pages || content.pages.length === 0) {
        list.innerHTML = '<p style="color: #666;">No pages yet</p>';
        return;
      }
      list.innerHTML = content.pages.map(page => `
        <div class="page-item">
          <div>
            <strong>${page.title}</strong>
            <span style="color: #666; margin-left: 1rem;">/page/${page.slug}</span>
          </div>
          <div>
            <button onclick="editPage('${page.slug}')">Edit</button>
            <button class="btn-danger" onclick="deletePage('${page.slug}')">Delete</button>
          </div>
        </div>
      `).join('');
    }

    function editPage(slug) {
      const page = content.pages.find(p => p.slug === slug);
      if (page) {
        document.getElementById('pageSlug').value = page.slug;
        document.getElementById('pageTitle').value = page.title;
        document.getElementById('pageContent').value = page.content || '';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      }
    }

    async function saveSettings() {
      try {
        await apiFetch('/api/content', {
          method: 'PUT',
          body: JSON.stringify({
            siteName: document.getElementById('siteName').value,
            tagline: document.getElementById('tagline').value,
            heroTitle: document.getElementById('heroTitle').value,
            heroSubtitle: document.getElementById('heroSubtitle').value,
            ctaText: document.getElementById('ctaText').value,
            ctaLink: document.getElementById('ctaLink').value
          })
        });
        showToast('Settings saved!');
        loadContent();
      } catch (err) {
        showToast('Error saving settings', 'error');
      }
    }

    async function savePage() {
      const slug = document.getElementById('pageSlug').value.trim();
      const title = document.getElementById('pageTitle').value.trim();
      const pageContent = document.getElementById('pageContent').value;

      if (!slug || !title) {
        return showToast('Slug and title required', 'error');
      }

      try {
        await apiFetch('/api/pages', {
          method: 'POST',
          body: JSON.stringify({ slug, title, content: pageContent })
        });
        showToast('Page saved!');
        document.getElementById('pageSlug').value = '';
        document.getElementById('pageTitle').value = '';
        document.getElementById('pageContent').value = '';
        loadContent();
      } catch (err) {
        showToast('Error saving page', 'error');
      }
    }

    async function deletePage(slug) {
      if (!confirm(`Delete page "${slug}"?`)) return;
      
      try {
        await apiFetch(`/api/pages/${slug}`, { method: 'DELETE' });
        showToast('Page deleted!');
        loadContent();
      } catch (err) {
        showToast('Error deleting page', 'error');
      }
    }

    // Check if already logged in
    if (token) {
      document.getElementById('login-screen').className = 'hidden';
      document.getElementById('admin-panel').className = '';
      loadContent();
    }
  </script>
</body>
</html>
