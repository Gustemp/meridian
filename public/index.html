<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STUDIO - Agência Criativa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Video Background -->
  <div class="video-container">
    <video id="video-bg-1" class="video-bg active" muted loop playsinline autoplay></video>
    <video id="video-bg-2" class="video-bg" muted loop playsinline></video>
    <div class="video-overlay"></div>
  </div>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Logo - Top Left -->
    <header class="header">
      <div class="logo" id="brand-name">STUDIO</div>
    </header>

    <!-- Hero Content - Bottom Left -->
    <section class="hero">
      <h1 class="hero-title" id="hero-title">Criamos experiências digitais únicas</h1>
      <p class="hero-description" id="hero-description">
        Somos uma agência criativa especializada em design, branding e desenvolvimento de produtos digitais que conectam marcas a pessoas.
      </p>
      
      <!-- Menu Links -->
      <nav class="menu-nav" id="menu-nav">
        <a href="#servicos" class="menu-link">
          <span class="menu-text">Nossos Serviços</span>
          <span class="menu-arrow">→</span>
        </a>
        <a href="#portfolio" class="menu-link">
          <span class="menu-text">Portfólio</span>
          <span class="menu-arrow">→</span>
        </a>
        <a href="#contato" class="menu-link">
          <span class="menu-text">Contato</span>
          <span class="menu-arrow">→</span>
        </a>
      </nav>
    </section>

    <!-- Video Progress Dots - Bottom Right -->
    <div class="video-progress" id="video-progress">
      <!-- Dots will be generated by JS -->
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
